name: Park Monitor
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch: # LINE（GAS）からの合図を受け取る
    types: [line_check]

permissions:
  contents: write

jobs:
  run-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install playwright line-bot-sdk
          playwright install chromium
      - name: Run script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # ↓このように修正（toJSON関数を使用し、全体をクォートで囲む）
          GITHUB_EVENT_PAYLOAD: "${{ toJSON(github.event.client_payload) }}"
        run: python check_park.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_status.txt
          git commit -m "Update last status" || exit 0
          git push
